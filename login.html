<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title> <!-- browser tab title , edit for each page -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="static/headers.css"> <!-- link stylesheets as required in head of doc -->
  </head>


  <body>
    <!-- bootstrap Javascript link keep on each html page -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  
    <!-- NAVBAR - should be common on all html pages-->
    <div class="container">
      <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
        <a href="index.html" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
          <svg class="bi me-2" width="40" height="32"><use xlink:href="#bootstrap"/></svg>
          <span class="fs-4">Home</span>
        </a>
  
        <ul class="nav nav-pills">
          
          <li class="nav-item"><a href="products.html" class="nav-link">Features</a></li>
          <li class="nav-item"><a href="pricing.html" class="nav-link">Pricing</a></li>
          <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
          <li class="nav-item"><a href="login.html" class="nav-link">Log in</a></li>
          
        </ul>
      </header>
    </div>

    <div class="container">
      <!-- Home page Content here -->
    
      
      <main class="form-signin w-100 m-auto">
        <form>
          <img class="mb-4" src="static/ASC.png" alt="asc" height="100">
      
        <form id="signInForm">
          <h1 class="h3 mb-3 fw-normal">Please sign in</h1>
  
          <div class="form-floating">
            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
            <label for="floatingInput">Email address</label>
          </div>
          <div class="form-floating">
            <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
            <label for="floatingPassword">Password</label>
          </div>
  
          <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
        </form>
      </main>

      <script>
        document.getElementById('signInForm').addEventListener('submit', function(event) {
          event.preventDefault(); // Prevent the form from actually submitting
          alert('Signed in!');
          window.location.href = 'index.html'; // Redirect to the new page
        });
      </script>

    </div>
  </body>
</html>
